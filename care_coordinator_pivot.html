<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Coordinator Overview</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f0ed;
  min-height: 100vh;
  padding: 16px;
}

/* ── Buttons ── */
.btn-section { margin-bottom: 16px; }
.btn-label {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.07em; color: #aaa;
  font-family: 'DM Mono', monospace; margin-bottom: 8px;
}
.btn-row { display: flex; flex-wrap: wrap; gap: 8px; }
.cc-btn {
  padding: 8px 16px; border-radius: 8px;
  border: 1.5px solid #e0deda; background: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  font-weight: 500; color: #444; cursor: pointer;
  transition: all 0.15s;
}
.cc-btn:hover { border-color: #2d6a4f; color: #2d6a4f; background: #f0f7f4; }
.cc-btn.active {
  background: #1a1916; color: #fff;
  border-color: #1a1916;
}
.cc-btn.active:hover { background: #2d6a4f; border-color: #2d6a4f; }

/* ── Table ── */
.table-wrap {
  overflow-x: auto; border-radius: 10px;
  border: 1px solid #e0deda; background: #fff;
}
table { border-collapse: collapse; min-width: 100%; font-size: 12px; }
thead th {
  background: #1a1916; color: #fff; padding: 9px 12px;
  font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
  white-space: nowrap; text-align: center; letter-spacing: 0.04em;
  position: sticky; top: 0; z-index: 2;
}
thead th:first-child {
  text-align: left; background: #111;
  position: sticky; left: 0; z-index: 3;
}
tbody tr { border-bottom: 1px solid #f0eeea; }
tbody tr:last-child { border-bottom: none; }
tbody td {
  padding: 8px 12px; text-align: center;
  vertical-align: middle; color: #444;
  font-family: 'DM Mono', monospace; font-size: 11px;
}
tbody td:first-child {
  text-align: left; font-weight: 500; color: #111;
  white-space: nowrap; background: #fafaf8;
  position: sticky; left: 0;
  border-right: 1px solid #e0deda; font-size: 11px;
}
.cell-val {
  display: inline-flex; align-items: center; justify-content: center;
  width: 34px; height: 20px; border-radius: 4px;
  font-size: 11px; font-weight: 500;
}
.cell-val.zero { color: #ccc; }
.cell-val.low  { background: #e8f5e9; color: #2d6a4f; }
.cell-val.mid  { background: #fff3e0; color: #e65100; }
.cell-val.high { background: #fde8d0; color: #b35a0a; }
.total-row td {
  background: #f8f7f5; font-weight: 600;
  border-top: 2px solid #e0deda; color: #111;
}
.total-row td:first-child { background: #f0eeea; }
.loading {
  padding: 32px; text-align: center; color: #aaa;
  font-family: 'DM Mono', monospace; font-size: 12px;
}
</style>
</head>
<body>

<!-- Buttons -->
<div class="btn-section">
  <div class="btn-label">Filter by Care Coordinator</div>
  <div class="btn-row" id="btnRow">
    <div class="loading" style="padding:8px">Loading…</div>
  </div>
</div>

<!-- Counts table -->
<div class="table-wrap">
  <div class="loading" id="loading">Loading data…</div>
  <table id="pivotTable" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  let summaryRows = [];
  let activeCC = null;

  grist.ready({ requiredAccess: 'full' });

  grist.onRecords(async (records) => {
    summaryRows = records;
    renderButtons();
    try {
      const wl = await grist.docApi.fetchTable('Week_List');
      buildTable(wl);
    } catch(e) {
      document.getElementById('loading').textContent = 'Error: ' + e.message;
    }
  });

  function getVal(table, col, i) {
    if (table[col + '_Value']) return table[col + '_Value'][i];
    if (table[col]) return table[col][i];
    return null;
  }

  function renderButtons() {
    const row = document.getElementById('btnRow');
    row.innerHTML = '';

    // "All" button
    const allBtn = document.createElement('button');
    allBtn.className = 'cc-btn' + (activeCC === null ? ' active' : '');
    allBtn.textContent = 'All';
    allBtn.onclick = () => selectCC(null, allBtn);
    row.appendChild(allBtn);

    summaryRows.forEach(r => {
      const cc = r.Care_Coordinator_Value || r.Care_Coordinator;
      if (!cc) return;
      const btn = document.createElement('button');
      btn.className = 'cc-btn' + (activeCC === cc ? ' active' : '');
      btn.textContent = cc;
      btn.dataset.cc = cc;
      btn.dataset.rowId = r.id;
      btn.onclick = () => selectCC(cc, btn, r.id);
      row.appendChild(btn);
    });
  }

  function selectCC(cc, btn, rowId) {
    activeCC = cc;

    // Update button styles
    document.querySelectorAll('.cc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Move cursor on summary table → triggers linked Backlogs List + Card
    if (rowId) {
      grist.setCursorPos({ rowId: rowId });
    }
  }

  function buildTable(wl) {
    if (!wl || !wl.id || wl.id.length === 0) {
      document.getElementById('loading').textContent = 'No data found.';
      return;
    }

    const weeksSet = new Set();
    const ccSet = new Set();

    for (let i = 0; i < wl.id.length; i++) {
      const week = getVal(wl, 'Week', i);
      const cc   = getVal(wl, 'Care_Coordinator', i);
      if (week) weeksSet.add(week);
      if (cc)   ccSet.add(cc);
    }

    const weeks = Array.from(weeksSet).sort();
    const coordinators = Array.from(ccSet).sort();

    // Build matrix (incomplete only)
    const matrix = {};
    coordinators.forEach(cc => {
      matrix[cc] = {};
      weeks.forEach(w => { matrix[cc][w] = 0; });
    });

    for (let i = 0; i < wl.id.length; i++) {
      const week = getVal(wl, 'Week', i);
      const cc   = getVal(wl, 'Care_Coordinator', i);
      const incomplete = !wl.Ready_to_Audit[i];
      if (week && cc && incomplete && matrix[cc] && matrix[cc][week] !== undefined) {
        matrix[cc][week]++;
      }
    }

    // Row totals
    const rowTotals = {};
    coordinators.forEach(cc => {
      rowTotals[cc] = weeks.reduce((s, w) => s + (matrix[cc][w] || 0), 0);
    });

    // Col totals
    const colTotals = {};
    weeks.forEach(w => {
      colTotals[w] = coordinators.reduce((s, cc) => s + (matrix[cc][w] || 0), 0);
    });

    // Header
    const thead = document.getElementById('thead');
    thead.innerHTML = '';
    const hRow = document.createElement('tr');
    const ccTh = document.createElement('th');
    ccTh.textContent = 'CARE COORDINATOR';
    hRow.appendChild(ccTh);
    weeks.forEach(w => {
      const th = document.createElement('th');
      const match = w.match(/Week\s+(\d+)/i);
      th.textContent = match ? 'Wk ' + match[1] : w;
      th.title = w;
      hRow.appendChild(th);
    });
    const totalTh = document.createElement('th');
    totalTh.textContent = 'TOTAL';
    hRow.appendChild(totalTh);
    thead.appendChild(hRow);

    // Body
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    coordinators.forEach(cc => {
      const tr = document.createElement('tr');
      const ccTd = document.createElement('td');
      ccTd.textContent = cc;
      tr.appendChild(ccTd);
      weeks.forEach(w => {
        const count = matrix[cc][w] || 0;
        const td = document.createElement('td');
        const span = document.createElement('span');
        span.className = 'cell-val ' + getColor(count);
        span.textContent = count === 0 ? '–' : count;
        td.appendChild(span);
        tr.appendChild(td);
      });
      const rtd = document.createElement('td');
      const rs = document.createElement('span');
      rs.className = 'cell-val ' + getColor(rowTotals[cc]);
      rs.textContent = rowTotals[cc] || '–';
      rtd.appendChild(rs);
      tr.appendChild(rtd);
      tbody.appendChild(tr);
    });

    // Totals row
    const tRow = document.createElement('tr');
    tRow.className = 'total-row';
    const tlbl = document.createElement('td');
    tlbl.textContent = 'TOTAL';
    tRow.appendChild(tlbl);
    weeks.forEach(w => {
      const td = document.createElement('td');
      td.textContent = colTotals[w] || 0;
      tRow.appendChild(td);
    });
    const grand = coordinators.reduce((s, cc) => s + (rowTotals[cc] || 0), 0);
    const gtd = document.createElement('td');
    gtd.textContent = grand;
    tRow.appendChild(gtd);
    tbody.appendChild(tRow);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('pivotTable').style.display = 'table';
  }

  function getColor(n) {
    if (!n || n === 0) return 'zero';
    if (n <= 20) return 'low';
    if (n <= 50) return 'mid';
    return 'high';
  }
</script>
</body>
</html>
