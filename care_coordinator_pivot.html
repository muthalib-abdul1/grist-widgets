<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Care Coordinator Pivot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f0ed;
  min-height: 100vh;
  padding: 16px;
  overflow-x: auto;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.title {
  font-size: 13px;
  font-weight: 600;
  color: #111;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.04em;
}

.legend {
  display: flex;
  gap: 12px;
  font-size: 11px;
  color: #888;
  font-family: 'DM Mono', monospace;
}

.legend-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}

.table-wrap {
  overflow-x: auto;
  border-radius: 10px;
  border: 1px solid #e0deda;
  background: #fff;
}

table {
  border-collapse: collapse;
  min-width: 100%;
  font-size: 12px;
}

thead th {
  background: #1a1916;
  color: #fff;
  padding: 10px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
  text-align: center;
  letter-spacing: 0.04em;
  position: sticky;
  top: 0;
  z-index: 2;
  cursor: pointer;
  transition: background 0.15s;
  user-select: none;
}

thead th:first-child {
  text-align: left;
  cursor: default;
  background: #111;
  position: sticky;
  left: 0;
  z-index: 3;
}

thead th:not(:first-child):hover {
  background: #2d6a4f;
}

thead th.active-col {
  background: #2d6a4f;
}

tbody tr {
  border-bottom: 1px solid #f0eeea;
  transition: background 0.1s;
}

tbody tr:last-child { border-bottom: none; }

tbody tr:hover { background: #f8f7f5; }

tbody td {
  padding: 9px 14px;
  text-align: center;
  vertical-align: middle;
  color: #444;
  font-family: 'DM Mono', monospace;
}

tbody td:first-child {
  text-align: left;
  font-weight: 500;
  color: #111;
  white-space: nowrap;
  background: #fafaf8;
  position: sticky;
  left: 0;
  border-right: 1px solid #e0deda;
  cursor: pointer;
  font-size: 11px;
}

tbody td:first-child:hover {
  background: #f0eeea;
  color: #2d6a4f;
}

tbody td:not(:first-child) {
  cursor: pointer;
  min-width: 70px;
}

.cell-val {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 22px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  transition: all 0.15s;
}

.cell-val.zero {
  color: #ccc;
  background: transparent;
}

.cell-val.low {
  background: #e8f5e9;
  color: #2d6a4f;
}

.cell-val.mid {
  background: #fff3e0;
  color: #e65100;
}

.cell-val.high {
  background: #fde8d0;
  color: #b35a0a;
}

tbody td:not(:first-child):hover .cell-val {
  transform: scale(1.15);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

tbody td.active-cell .cell-val {
  background: #1a1916 !important;
  color: #fff !important;
  transform: scale(1.1);
}

.total-row td {
  background: #f8f7f5;
  font-weight: 600;
  border-top: 2px solid #e0deda;
  color: #111;
  font-size: 11px;
}

.total-row td:first-child {
  background: #f0eeea;
}

.loading {
  padding: 40px;
  text-align: center;
  color: #aaa;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
}

.selected-info {
  margin-top: 10px;
  padding: 8px 12px;
  background: #1a1916;
  color: #fff;
  border-radius: 7px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  display: none;
}

.selected-info.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="title">📊 Care Coordinator Overview</div>
  <div class="legend">
    <span><span class="legend-dot" style="background:#2d6a4f"></span>Low</span>
    <span><span class="legend-dot" style="background:#e65100"></span>Mid</span>
    <span><span class="legend-dot" style="background:#b35a0a"></span>High</span>
  </div>
</div>

<div class="table-wrap">
  <div class="loading" id="loading">Loading data…</div>
  <table id="pivotTable" style="display:none">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="selected-info" id="selectedInfo"></div>

<script>
  let allRecords = [];
  let selectedWeek = null;
  let selectedCC = null;

  grist.ready({ requiredAccess: 'full' });

  grist.onRecords((records) => {
    allRecords = records;
    buildPivot(records);
  });

  function buildPivot(records) {
    // Get unique weeks (rows) and care coordinators (columns)
    const weeksSet = new Map();
    const ccSet = new Set();

    records.forEach(r => {
      const week = r.Week_Value || r.Week;
      const cc = r.Care_Coordinator_Value || r.Care_Coordinator;
      const incomplete = !r.Ready_to_Audit;
      if (week) weeksSet.set(week, r.id);
      if (cc) ccSet.add(cc);
    });

    const weeks = Array.from(weeksSet.keys()).sort();
    const coordinators = Array.from(ccSet).sort();

    if (weeks.length === 0 || coordinators.length === 0) {
      document.getElementById('loading').textContent = 'No data found. Make sure Care_Coordinator and Week columns exist.';
      return;
    }

    // Build count matrix
    const matrix = {};
    weeks.forEach(w => {
      matrix[w] = {};
      coordinators.forEach(cc => { matrix[w][cc] = 0; });
    });

    records.forEach(r => {
      const week = r.Week_Value || r.Week;
      const cc = r.Care_Coordinator_Value || r.Care_Coordinator;
      const incomplete = !r.Ready_to_Audit;
      if (week && cc && incomplete && matrix[week] && matrix[week][cc] !== undefined) {
        matrix[week][cc]++;
      }
    });

    // Column totals
    const colTotals = {};
    coordinators.forEach(cc => {
      colTotals[cc] = weeks.reduce((sum, w) => sum + (matrix[w][cc] || 0), 0);
    });

    // Render header
    const thead = document.getElementById('thead');
    thead.innerHTML = '';
    const headerRow = document.createElement('tr');
    const weekTh = document.createElement('th');
    weekTh.textContent = 'WEEK';
    headerRow.appendChild(weekTh);

    coordinators.forEach(cc => {
      const th = document.createElement('th');
      th.textContent = cc.split(' ')[0]; // First name only to save space
      th.title = cc;
      th.dataset.cc = cc;
      th.onclick = () => filterByCC(cc, th);
      headerRow.appendChild(th);
    });

    // Total column header
    const totalTh = document.createElement('th');
    totalTh.textContent = 'TOTAL';
    totalTh.style.cursor = 'default';
    headerRow.appendChild(totalTh);
    thead.appendChild(headerRow);

    // Render body
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    weeks.forEach(week => {
      const tr = document.createElement('tr');
      const weekTd = document.createElement('td');
      weekTd.textContent = week;
      weekTd.title = week;
      weekTd.onclick = () => filterByWeek(week);
      tr.appendChild(weekTd);

      let rowTotal = 0;
      coordinators.forEach(cc => {
        const count = matrix[week][cc] || 0;
        rowTotal += count;
        const td = document.createElement('td');
        td.dataset.week = week;
        td.dataset.cc = cc;

        const span = document.createElement('span');
        span.className = 'cell-val ' + getColor(count);
        span.textContent = count === 0 ? '–' : count;
        td.appendChild(span);

        if (count > 0) {
          td.onclick = () => filterByCell(week, cc, td);
        }
        tr.appendChild(td);
      });

      // Row total
      const totalTd = document.createElement('td');
      const totalSpan = document.createElement('span');
      totalSpan.className = 'cell-val ' + getColor(rowTotal);
      totalSpan.textContent = rowTotal === 0 ? '–' : rowTotal;
      totalTd.appendChild(totalSpan);
      totalTd.style.cursor = 'default';
      tr.appendChild(totalTd);

      tbody.appendChild(tr);
    });

    // Totals row
    const totalRow = document.createElement('tr');
    totalRow.className = 'total-row';
    const totalLabel = document.createElement('td');
    totalLabel.textContent = 'TOTAL';
    totalRow.appendChild(totalLabel);

    coordinators.forEach(cc => {
      const td = document.createElement('td');
      td.textContent = colTotals[cc] || 0;
      totalRow.appendChild(td);
    });

    const grandTotal = Object.values(colTotals).reduce((a, b) => a + b, 0);
    const grandTd = document.createElement('td');
    grandTd.textContent = grandTotal;
    totalRow.appendChild(grandTd);
    tbody.appendChild(totalRow);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('pivotTable').style.display = 'table';
  }

  function getColor(n) {
    if (n === 0) return 'zero';
    if (n <= 20) return 'low';
    if (n <= 50) return 'mid';
    return 'high';
  }

  function clearActive() {
    document.querySelectorAll('td.active-cell').forEach(el => el.classList.remove('active-cell'));
    document.querySelectorAll('th.active-col').forEach(el => el.classList.remove('active-col'));
  }

  function filterByCC(cc, th) {
    clearActive();
    selectedCC = cc;
    selectedWeek = null;
    th.classList.add('active-col');

    // Highlight column cells
    document.querySelectorAll(`td[data-cc="${cc}"]`).forEach(td => td.classList.add('active-cell'));

    showInfo(`Filtering by: ${cc}`);
    sendFilterToGrist();
  }

  function filterByWeek(week) {
    clearActive();
    selectedWeek = week;
    selectedCC = null;

    // Highlight row
    document.querySelectorAll(`td[data-week="${week}"]`).forEach(td => td.classList.add('active-cell'));

    showInfo(`Filtering by: ${week}`);
    sendFilterToGrist();
  }

  function filterByCell(week, cc, td) {
    clearActive();
    selectedWeek = week;
    selectedCC = cc;
    td.classList.add('active-cell');

    // Highlight column header
    document.querySelectorAll(`th[data-cc="${cc}"]`).forEach(th => th.classList.add('active-col'));

    showInfo(`Filtering by: ${week} × ${cc}`);
    sendFilterToGrist();
  }

  function showInfo(msg) {
    const el = document.getElementById('selectedInfo');
    el.textContent = '🎯 ' + msg + ' — backlog list updated';
    el.classList.add('visible');
  }

  function sendFilterToGrist() {
    // Find matching record IDs
    const matchingIds = allRecords
      .filter(r => {
        const week = r.Week_Value || r.Week;
        const cc = r.Care_Coordinator_Value || r.Care_Coordinator;
        const weekMatch = !selectedWeek || week === selectedWeek;
        const ccMatch = !selectedCC || cc === selectedCC;
        return weekMatch && ccMatch;
      })
      .map(r => r.id);

    if (matchingIds.length > 0) {
      // Set cursor to first matching record — this triggers linked widgets
      grist.setCursorPos({ rowId: matchingIds[0] });
    }
  }
</script>
</body>
</html>
