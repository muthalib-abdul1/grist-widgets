<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR Access Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f0ed;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

/* ── Collapsed bar ── */
#collapsedBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #1a1916;
  color: #fff;
  padding: 10px 16px;
  cursor: pointer;
  border-radius: 10px 10px 0 0;
  user-select: none;
  transition: background 0.15s;
}
#collapsedBar:hover { background: #2d6a4f; }
.bar-left {
  display: flex; align-items: center; gap: 8px;
  font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500;
}
.bar-count {
  background: #2d6a4f; color: #fff;
  font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 10px;
  font-family: 'DM Mono', monospace;
}
.bar-arrow { font-size: 12px; transition: transform 0.2s; }
.bar-arrow.open { transform: rotate(180deg); }

/* ── Expanded panel ── */
#expandedPanel {
  display: none;
  background: #fff;
  border: 1px solid #e0deda;
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  flex-direction: column;
  max-height: 460px;
}
#expandedPanel.visible { display: flex; }

.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid #f0eeea;
  flex-shrink: 0;
}
.panel-title {
  font-size: 13px; font-weight: 600; color: #111;
  display: flex; align-items: center; gap: 6px;
}
.panel-actions { display: flex; gap: 8px; align-items: center; }
.btn-sm {
  padding: 4px 10px; border-radius: 6px;
  border: 1.5px solid #e0deda; background: #f8f7f5;
  font-family: 'DM Mono', monospace; font-size: 10px;
  font-weight: 500; color: #333; cursor: pointer;
  transition: all 0.15s;
}
.btn-sm:hover { border-color: #b35a0a; color: #b35a0a; background: #fde8d0; }
.btn-sm.export:hover { border-color: #2d6a4f; color: #2d6a4f; background: #e8f5e9; }

/* ── User identity bar ── */
.identity-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  background: #f8f7f5;
  border-bottom: 1px solid #ece9e4;
  flex-shrink: 0;
}
.identity-bar label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: #888; text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap;
}
.identity-bar input {
  flex: 1; padding: 3px 8px;
  border: 1px solid #e0deda; border-radius: 5px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: #111; background: #fff; outline: none;
}
.identity-bar input:focus { border-color: #2d6a4f; }
.identity-bar .save-btn {
  padding: 3px 10px; border-radius: 5px;
  border: 1.5px solid #2d6a4f; background: #2d6a4f;
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: #fff; cursor: pointer;
}
.identity-bar .save-btn:hover { background: #1a4d35; }

.log-wrap { overflow-y: auto; flex: 1; }

table { width: 100%; border-collapse: collapse; }
thead th {
  background: #f8f7f5;
  padding: 7px 12px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  font-weight: 700; color: #111; text-align: left;
  white-space: nowrap;
  position: sticky; top: 0;
  border-bottom: 1px solid #e0deda;
  text-transform: uppercase; letter-spacing: 0.05em;
}
tbody tr { border-bottom: 1px solid #f5f4f2; }
tbody tr:hover { background: #fafaf8; }
tbody td {
  padding: 6px 12px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: #111; white-space: nowrap;
}
tbody td.ts { color: #444; font-size: 10px; }

.empty-state {
  padding: 24px; text-align: center;
  font-family: 'DM Mono', monospace; font-size: 11px; color: #bbb;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #2d6a4f; display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
</style>
</head>
<body>

<div id="expandedPanel">
  <div class="panel-header">
    <div class="panel-title">
      <span class="live-dot"></span>
      EMR Access Log
    </div>
    <div class="panel-actions">
      <button class="btn-sm export" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="btn-sm" onclick="clearLog()">🗑 Clear Log</button>
    </div>
  </div>

  <!-- Identity bar — shows who is viewing, editable -->
  <div class="identity-bar">
    <label>Viewing as:</label>
    <input type="text"  id="inputName"  placeholder="Your name"  />
    <input type="email" id="inputEmail" placeholder="Your email" />
    <button class="save-btn" onclick="saveIdentity()">Save</button>
  </div>

  <div class="log-wrap">
    <div class="empty-state" id="emptyState">No access events logged yet.</div>
    <table id="logTable" style="display:none">
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>User Name</th>
          <th>Email</th>
          <th>Practitioner</th>
          <th>Facility</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<div id="collapsedBar" onclick="togglePanel()">
  <div class="bar-left">
    🔒 EMR Access Log
    <span class="bar-count" id="barCount">0</span>
  </div>
  <span class="bar-arrow" id="barArrow">▲</span>
</div>

<script>
  const STORAGE_KEY    = 'emr_access_log_v4';
  const IDENTITY_KEY   = 'emr_access_identity_v1';
  let isOpen = false;
  let userName  = '';
  let userEmail = '';

  grist.ready({ requiredAccess: 'full' });

  // ── Load saved identity ──────────────────────────────────────
  function loadIdentity() {
    try {
      const saved = JSON.parse(localStorage.getItem(IDENTITY_KEY) || '{}');
      userName  = saved.name  || '';
      userEmail = saved.email || '';
      document.getElementById('inputName').value  = userName;
      document.getElementById('inputEmail').value = userEmail;
    } catch(e) {}
  }

  function saveIdentity() {
    userName  = document.getElementById('inputName').value.trim();
    userEmail = document.getElementById('inputEmail').value.trim();
    try {
      localStorage.setItem(IDENTITY_KEY, JSON.stringify({ name: userName, email: userEmail }));
    } catch(e) {}
  }

  // ── Try grist.getUser() and pre-fill if it works ─────────────
  function tryAutoFillUser() {
    if (typeof grist.getUser !== 'function') return;
    grist.getUser().then(u => {
      if (!u) return;
      const n = u.name  || u.Name  || u.fullName  || '';
      const e = u.email || u.Email || u.loginEmail || '';
      // Only auto-fill if identity fields are empty
      if (n && !userName) {
        userName = n;
        document.getElementById('inputName').value = n;
      }
      if (e && !userEmail) {
        userEmail = e;
        document.getElementById('inputEmail').value = e;
      }
      if (n || e) saveIdentity();
    }).catch(() => {});
  }

  // ── Record listener ──────────────────────────────────────────
  grist.onRecord((record) => {
    if (!record || !record.id) return;
    logAccess(record);
    updateBarCount();
    if (isOpen) renderTable();
  });

  function logAccess(record) {
    const name  = userName  || 'Unknown';
    const email = userEmail || 'Unknown';

    const practitioner = record.Practitioner_Name_Value
                      || record.Practitioner_Name
                      || '—';
    const rawFacility = record.Facility_Name_Value || record.Facility_Name;
    const facility = Array.isArray(rawFacility)
                      ? rawFacility.join(', ')
                      : (rawFacility || '—');

    const entry = {
      timestamp: new Date().toLocaleString('en-US', {
                   month: '2-digit', day: '2-digit', year: 'numeric',
                   hour: '2-digit', minute: '2-digit', second: '2-digit'
                 }),
      name,
      email,
      practitioner,
      facility
    };

    const logs = getLogs();
    logs.unshift(entry);
    if (logs.length > 500) logs.length = 500;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); } catch(e) {}
  }

  function getLogs() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function updateBarCount() {
    document.getElementById('barCount').textContent = getLogs().length;
  }

  function renderTable() {
    const logs  = getLogs();
    const tbody = document.getElementById('logBody');
    const table = document.getElementById('logTable');
    const empty = document.getElementById('emptyState');

    if (logs.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    table.style.display = 'table';
    tbody.innerHTML = '';
    logs.forEach(e => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="ts">${e.timestamp}</td>
        <td>${e.name}</td>
        <td>${e.email}</td>
        <td>${e.practitioner}</td>
        <td>${e.facility}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function togglePanel() {
    isOpen = !isOpen;
    document.getElementById('expandedPanel').classList.toggle('visible', isOpen);
    document.getElementById('barArrow').classList.toggle('open', isOpen);
    if (isOpen) renderTable();
  }

  function clearLog() {
    if (!confirm('Clear all access log entries?')) return;
    localStorage.removeItem(STORAGE_KEY);
    updateBarCount();
    renderTable();
  }

  function exportCSV() {
    const logs = getLogs();
    if (logs.length === 0) return;
    const headers = ['Timestamp', 'User Name', 'Email', 'Practitioner', 'Facility'];
    const rows = logs.map(e => [
      e.timestamp, e.name, e.email, e.practitioner, e.facility
    ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `emr_access_log_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Init ─────────────────────────────────────────────────────
  loadIdentity();
  tryAutoFillUser();
  updateBarCount();
</script>
</body>
</html>
