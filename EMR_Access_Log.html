<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR Access Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f0ed;
  min-height: 100vh;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
}
.title {
  font-size: 13px; font-weight: 600; color: #111;
  display: flex; align-items: center; gap: 8px;
}
.count-badge {
  background: #1a1916; color: #fff;
  font-family: 'DM Mono', monospace; font-size: 10px;
  font-weight: 500; padding: 2px 7px; border-radius: 10px;
}
.actions { display: flex; gap: 8px; }
.btn-sm {
  padding: 4px 12px; border-radius: 6px;
  border: 1.5px solid #e0deda; background: #fff;
  font-family: 'DM Mono', monospace; font-size: 10px;
  font-weight: 500; color: #444; cursor: pointer;
  transition: all 0.15s;
}
.btn-sm:hover { border-color: #b35a0a; color: #b35a0a; background: #fde8d0; }
.btn-sm.export { }
.btn-sm.export:hover { border-color: #2d6a4f; color: #2d6a4f; background: #e8f5e9; }

.table-wrap {
  border-radius: 10px; border: 1px solid #e0deda;
  background: #fff; overflow: hidden; overflow-x: auto;
  flex: 1;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  background: #1a1916; color: #fff;
  padding: 8px 12px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  font-weight: 500; text-align: left;
  white-space: nowrap; letter-spacing: 0.04em;
  position: sticky; top: 0;
}
tbody tr { border-bottom: 1px solid #f0eeea; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #fafaf8; }
tbody td {
  padding: 7px 12px;
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: #111; white-space: nowrap;
}
tbody td.ts { color: #666; font-size: 9px; }

.empty {
  padding: 32px; text-align: center;
  font-family: 'DM Mono', monospace; font-size: 11px; color: #bbb;
}
.loading {
  padding: 20px; text-align: center;
  font-family: 'DM Mono', monospace; font-size: 11px; color: #aaa;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #2d6a4f; display: inline-block;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<div class="header">
  <div class="title">
    <span class="live-dot"></span>
    EMR Access Log
    <span class="count-badge" id="countBadge">—</span>
  </div>
  <div class="actions">
    <button class="btn-sm export" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn-sm" onclick="clearLog()">🗑 Clear</button>
  </div>
</div>

<div class="table-wrap">
  <div class="loading" id="loadingMsg">Loading…</div>
  <table id="logTable" style="display:none">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>User Name</th>
        <th>Email</th>
        <th>Practitioner</th>
        <th>Facility</th>
      </tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>
</div>

<script>
  grist.ready({ requiredAccess: 'full' });

  // Auto-refresh whenever any record changes in the doc
  grist.onRecords(() => loadLog());

  async function loadLog() {
    try {
      const t = await grist.docApi.fetchTable('EMR_Access_Log');
      const tbody  = document.getElementById('logBody');
      const table  = document.getElementById('logTable');
      const loading = document.getElementById('loadingMsg');
      const badge  = document.getElementById('countBadge');

      loading.style.display = 'none';

      if (!t.id || t.id.length === 0) {
        table.style.display = 'none';
        loading.textContent = 'No access events logged yet.';
        loading.style.display = 'block';
        badge.textContent = '0';
        return;
      }

      badge.textContent = t.id.length;
      table.style.display = 'table';
      tbody.innerHTML = '';

      const indices = [...Array(t.id.length).keys()].reverse();
      indices.forEach(i => {
        const ts = t.Timestamp?.[i];
        const formatted = typeof ts === 'number'
          ? new Date(ts * 1000).toLocaleString('en-US', {
              month:'2-digit', day:'2-digit', year:'numeric',
              hour:'2-digit', minute:'2-digit', second:'2-digit'
            })
          : (ts || '—');

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="ts">${formatted}</td>
          <td>${t.User_Name?.[i]    || '—'}</td>
          <td>${t.User_Email?.[i]   || '—'}</td>
          <td>${t.Practitioner?.[i] || '—'}</td>
          <td>${t.Facility?.[i]     || '—'}</td>
        `;
        tbody.appendChild(tr);
      });
    } catch(e) {
      document.getElementById('loadingMsg').textContent = 'Error: ' + e.message;
      document.getElementById('loadingMsg').style.display = 'block';
    }
  }

  async function clearLog() {
    if (!confirm('Delete all log entries from the Grist table?')) return;
    try {
      const t = await grist.docApi.fetchTable('EMR_Access_Log');
      if (t.id && t.id.length > 0) {
        for (let i = 0; i < t.id.length; i += 50) {
          await grist.docApi.applyUserActions(
            t.id.slice(i, i+50).map(id => ['RemoveRecord', 'EMR_Access_Log', id])
          );
        }
      }
      loadLog();
    } catch(e) { alert('Error: ' + e.message); }
  }

  async function exportCSV() {
    try {
      const t = await grist.docApi.fetchTable('EMR_Access_Log');
      if (!t.id || !t.id.length) return;
      const headers = ['Timestamp','User Name','Email','Practitioner','Facility'];
      const indices = [...Array(t.id.length).keys()].reverse();
      const rows = indices.map(i => {
        const ts = t.Timestamp?.[i];
        const formatted = typeof ts === 'number'
          ? new Date(ts * 1000).toLocaleString('en-US') : (ts || '');
        return [
          formatted,
          t.User_Name?.[i]    || '',
          t.User_Email?.[i]   || '',
          t.Practitioner?.[i] || '',
          t.Facility?.[i]     || ''
        ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
      });
      const csv = [headers.join(','), ...rows].join('\n');
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
      a.download = `emr_access_log_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    } catch(e) { alert('Export error: ' + e.message); }
  }

  loadLog();
</script>
</body>
</html>
