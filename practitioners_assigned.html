<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facility Practitioners</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f0ed;
  min-height: 100vh;
  padding: 16px;
}
.facility-header {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: #aaa;
  font-family: 'DM Mono', monospace; margin-bottom: 14px;
}
.columns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.column-header {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: #999;
  font-family: 'DM Mono', monospace;
  margin-bottom: 4px;
}
.column-count {
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: #bbb; margin-bottom: 10px;
  min-height: 16px;
}
.practitioner-card {
  background: #fff; border: 1px solid #e0deda;
  border-radius: 10px; padding: 12px 14px;
  margin-bottom: 8px; display: flex;
  align-items: center; gap: 10px;
  transition: box-shadow 0.15s;
}
.practitioner-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.practitioner-card.primary    { border-left: 4px solid #1a1916; }
.practitioner-card.backup     { border-left: 4px solid #e0deda; }
.practitioner-card.empty-slot { border-left: 4px solid #f0eeea; background: #fafaf8; opacity: 0.55; }
.practitioner-card.credentialed { border-left: 4px solid #1a1916; }
.role-badge {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; font-family: 'DM Mono', monospace;
  padding: 3px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
}
.role-badge.primary { background: #1a1916; color: #fff; }
.role-badge.backup  { background: #f1f0ed; color: #888; }
.role-badge.empty   { background: #f1f0ed; color: #ccc; }
.role-badge.index   { background: #f1f0ed; color: #888; min-width: 30px; text-align: center; }
.practitioner-name { font-size: 13px; font-weight: 500; color: #111; }
.practitioner-name.unassigned { color: #ccc; font-style: italic; font-weight: 400; }
.empty-state {
  padding: 24px; text-align: center; color: #bbb;
  font-family: 'DM Mono', monospace; font-size: 11px;
  background: #fff; border-radius: 10px; border: 1px solid #e0deda;
}
.debug {
  font-size: 10px; font-family: 'DM Mono', monospace;
  background: #fff3cd; border: 1px solid #ffc107;
  border-radius: 6px; padding: 8px; margin-bottom: 12px;
  color: #555; word-break: break-all; white-space: pre-wrap;
}
</style>
</head>
<body>

<div class="facility-header" id="facilityName">FACILITY PRACTITIONERS</div>
<div id="debug" class="debug">Waiting for data...</div>
<div class="columns">
  <div>
    <div class="column-header">Assigned</div>
    <div class="column-count" id="assignedCount"></div>
    <div id="assignedList"><div class="empty-state">Select a facility</div></div>
  </div>
  <div>
    <div class="column-header">Credentialed</div>
    <div class="column-count" id="credentialedCount"></div>
    <div id="credentialedList"><div class="empty-state">Select a facility</div></div>
  </div>
</div>

<script>
  var empMap = {};
  var empMapReady = false;
  var pendingRecord = null;

  function findKey(record, candidates) {
    var keys = Object.keys(record);
    for (var i = 0; i < candidates.length; i++) {
      var c = candidates[i].toLowerCase();
      for (var j = 0; j < keys.length; j++) {
        if (keys[j].toLowerCase() === c) return keys[j];
      }
    }
    for (var i = 0; i < candidates.length; i++) {
      var c = candidates[i].toLowerCase();
      for (var j = 0; j < keys.length; j++) {
        if (keys[j].toLowerCase().includes(c)) return keys[j];
      }
    }
    return null;
  }

  function resolveRefList(raw) {
    if (!raw) return [];
    if (Array.isArray(raw)) {
      var ids = raw.filter(function(v) { return typeof v === 'number'; });
      if (ids.length > 0) {
        return ids.map(function(id) { return empMap[id] || ('ID:' + id); }).filter(Boolean);
      }
    }
    if (typeof raw === 'string' && raw.trim()) {
      return raw.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
    }
    return [];
  }

  function makeCard(text, badgeText, cardClass, badgeClass, nameClass) {
    var card = document.createElement('div');
    card.className = 'practitioner-card ' + cardClass;
    var badge = document.createElement('span');
    badge.className = 'role-badge ' + badgeClass;
    badge.textContent = badgeText;
    var nameEl = document.createElement('span');
    nameEl.className = 'practitioner-name' + (nameClass ? ' ' + nameClass : '');
    nameEl.textContent = text;
    card.appendChild(badge);
    card.appendChild(nameEl);
    return card;
  }

  function render(record) {
    // ── DEBUG: show all keys and the raw credentialed value ─────────────────
    var credKey = findKey(record, ['Credentialed_Practitioners', 'CredentialedPractitioners', 'Credentialed']);
    var rawCred = credKey ? record[credKey] : 'KEY NOT FOUND';
    var debugEl = document.getElementById('debug');
    debugEl.textContent =
      'Keys: ' + Object.keys(record).join(', ') + '\n' +
      'Cred key found: ' + (credKey || 'NONE') + '\n' +
      'Raw value: ' + JSON.stringify(rawCred) + '\n' +
      'empMap size: ' + Object.keys(empMap).length;

    // Facility name
    var facilityKey = findKey(record, ['Facility_Name', 'FacilityName', 'Facility']);
    var facilityName = facilityKey ? record[facilityKey] : '';
    document.getElementById('facilityName').textContent =
      facilityName ? facilityName.toUpperCase() : 'FACILITY PRACTITIONERS';

    // ── LEFT: Assigned ──────────────────────────────────────────────────────
    var slots = [
      { role: 'Primary',    candidates: ['Primary_Practitioner', 'Primary', 'PrimaryPractitioner'], isPrimary: true  },
      { role: '1st Backup', candidates: ['1st_Backup', 'c1st_Backup', 'Backup1'],  isPrimary: false },
      { role: '2nd Backup', candidates: ['2nd_Backup', 'c2nd_Backup', 'Backup2'],  isPrimary: false },
      { role: '3rd Backup', candidates: ['3rd_Backup', 'c3rd_Backup', 'Backup3'],  isPrimary: false },
      { role: '4th Backup', candidates: ['4th_Backup', 'c4th_Backup', 'Backup4'],  isPrimary: false },
    ];

    var assignedList = document.getElementById('assignedList');
    assignedList.innerHTML = '';
    var assignedCount = 0;

    slots.forEach(function(slot) {
      var key = findKey(record, slot.candidates);
      var value = key ? record[key] : undefined;
      var hasValue = value && String(value).trim() !== '';
      if (hasValue) assignedCount++;
      var cardClass  = hasValue ? (slot.isPrimary ? 'primary' : 'backup') : 'empty-slot';
      var badgeClass = hasValue ? (slot.isPrimary ? 'primary' : 'backup') : 'empty';
      assignedList.appendChild(makeCard(
        hasValue ? String(value) : 'Not assigned',
        slot.role, cardClass, badgeClass,
        hasValue ? '' : 'unassigned'
      ));
    });

    document.getElementById('assignedCount').textContent =
      assignedCount + ' practitioner' + (assignedCount !== 1 ? 's' : '');

    // ── RIGHT: Credentialed ─────────────────────────────────────────────────
    var names = resolveRefList(rawCred);
    names.sort(function(a, b) { return a.localeCompare(b); });

    var credList = document.getElementById('credentialedList');
    credList.innerHTML = '';

    if (names.length === 0) {
      document.getElementById('credentialedCount').textContent = '';
      credList.innerHTML = '<div class="empty-state">No credentialed practitioners on record</div>';
    } else {
      document.getElementById('credentialedCount').textContent =
        names.length + ' practitioner' + (names.length !== 1 ? 's' : '');
      names.forEach(function(name, i) {
        credList.appendChild(makeCard(
          name,
          String(i + 1).padStart(2, '0'),
          'credentialed', 'index', ''
        ));
      });
    }
  }

  grist.ready({ requiredAccess: 'read table' });

  grist.docApi.fetchTable('Employee').then(function(data) {
    for (var i = 0; i < data.id.length; i++) {
      empMap[data.id[i]] = data.Employee_Name[i];
    }
    empMapReady = true;
    if (pendingRecord) {
      render(pendingRecord);
      pendingRecord = null;
    }
  }).catch(function(e) {
    empMapReady = true;
    if (pendingRecord) {
      render(pendingRecord);
      pendingRecord = null;
    }
  });

  grist.onRecord(function(record) {
    if (!empMapReady) {
      pendingRecord = record;
    } else {
      render(record);
    }
  });
</script>
</body>
</html>
