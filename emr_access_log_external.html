<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR Access Log</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f1f0ed; min-height: 100vh; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.header { display: flex; align-items: center; justify-content: space-between; }
.title { font-size: 13px; font-weight: 600; color: #111; display: flex; align-items: center; gap: 8px; }
.count-badge { background: #1a1916; color: #fff; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px; }
.actions { display: flex; gap: 8px; }
.btn-sm { padding: 4px 12px; border-radius: 6px; border: 1.5px solid #e0deda; background: #fff; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: #444; cursor: pointer; transition: all 0.15s; }
.btn-sm:hover { border-color: #b35a0a; color: #b35a0a; background: #fde8d0; }
.btn-sm.export:hover { border-color: #2d6a4f; color: #2d6a4f; background: #e8f5e9; }
.table-wrap { border-radius: 10px; border: 1px solid #e0deda; background: #fff; overflow: hidden; overflow-x: auto; flex: 1; }
table { width: 100%; border-collapse: collapse; }
thead th { background: #1a1916; color: #fff; padding: 8px 12px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; text-align: center; white-space: nowrap; letter-spacing: 0.04em; position: sticky; top: 0; border-right: 1px solid rgba(255,255,255,0.08); }
thead th:last-child { border-right: none; }
tbody tr:nth-child(odd) { background: #ffffff; }
tbody tr:nth-child(even) { background: #f7f6f3; }
tbody tr:hover { background: #eef5f1; }
tbody tr { border-bottom: 1px solid #eeece8; }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 7px 12px; font-family: 'DM Mono', monospace; font-size: 10px; color: #111; white-space: nowrap; text-align: center; border-right: 1px solid #f0eeea; }
tbody td:last-child { border-right: none; }
tbody td.ts { color: #666; font-size: 9px; }
.loading { padding: 20px; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: #aaa; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: #2d6a4f; display: inline-block; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.error-msg { padding: 20px; text-align: center; font-family: 'DM Mono', monospace; font-size: 11px; color: #b35a0a; }
</style>
</head>
<body>

<div class="header">
  <div class="title">
    <span class="live-dot"></span>
    EMR Access Log
    <span class="count-badge" id="countBadge">—</span>
  </div>
  <div class="actions">
    <button class="btn-sm export" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn-sm" onclick="clearLog()">🗑 Clear</button>
  </div>
</div>

<div class="table-wrap">
  <div class="loading" id="loadingMsg">Loading…</div>
  <div class="error-msg" id="errorMsg" style="display:none"></div>
  <table id="logTable" style="display:none">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>User Name</th>
        <th>User Email</th>
        <th>Practitioner</th>
        <th>Facility</th>
      </tr>
    </thead>
    <tbody id="logBody"></tbody>
  </table>
</div>

<script>
  // ── Read config from URL params ──
  const urlParams    = new URLSearchParams(window.location.search);
  const MAIN_API_KEY = urlParams.get('apikey')  || '';
  const MAIN_DOC_ID  = urlParams.get('maindoc') || '';
  const GRIST_DOMAIN = 'idsolns.getgrist.com';

  async function init() {
    if (!MAIN_API_KEY || !MAIN_DOC_ID) {
      showError('Missing apikey or maindoc URL parameters.');
      return;
    }
    await loadLog();
    // Refresh every 60 seconds
    setInterval(loadLog, 60000);
  }

  async function loadLog() {
    try {
      const response = await fetch(
        `https://${GRIST_DOMAIN}/api/docs/${MAIN_DOC_ID}/tables/EMR_Access_Log/records`,
        {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + MAIN_API_KEY }
        }
      );

      if (!response.ok) {
        const body = await response.text();
        showError('Failed to load log: HTTP ' + response.status + ' — ' + body.substring(0, 100));
        return;
      }

      const data    = await response.json();
      const records = data.records || [];
      const tbody   = document.getElementById('logBody');
      const table   = document.getElementById('logTable');
      const loading = document.getElementById('loadingMsg');
      const badge   = document.getElementById('countBadge');

      loading.style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';

      if (records.length === 0) {
        table.style.display = 'none';
        loading.textContent = 'No access events logged yet.';
        loading.style.display = 'block';
        badge.textContent = '0';
        return;
      }

      badge.textContent = records.length;
      table.style.display = 'table';
      tbody.innerHTML = '';

      // Sort newest first
      const sorted = [...records].sort((a, b) => (b.fields.Timestamp || 0) - (a.fields.Timestamp || 0));

      sorted.forEach(r => {
        const f  = r.fields;
        const ts = f.Timestamp;
        const formatted = typeof ts === 'number'
          ? new Date(ts * 1000).toLocaleString('en-US', {
              month:'2-digit', day:'2-digit', year:'numeric',
              hour:'2-digit', minute:'2-digit', second:'2-digit'
            })
          : (ts || '—');

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="ts">${formatted}</td>
          <td>${f.User_Name    || '—'}</td>
          <td>${f.User_Email   || '—'}</td>
          <td>${f.Practitioner || '—'}</td>
          <td>${f.Facility     || '—'}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch(e) {
      showError('Error: ' + e.message);
    }
  }

  async function clearLog() {
    if (!confirm('Delete all log entries from the main document?')) return;
    try {
      // Fetch all record IDs first
      const response = await fetch(
        `https://${GRIST_DOMAIN}/api/docs/${MAIN_DOC_ID}/tables/EMR_Access_Log/records`,
        { headers: { 'Authorization': 'Bearer ' + MAIN_API_KEY } }
      );
      const data = await response.json();
      const ids  = (data.records || []).map(r => r.id);

      if (ids.length === 0) return;

      // Delete in batches of 50
      for (let i = 0; i < ids.length; i += 50) {
        const batch = ids.slice(i, i + 50);
        await fetch(
          `https://${GRIST_DOMAIN}/api/docs/${MAIN_DOC_ID}/tables/EMR_Access_Log/data/delete`,
          {
            method: 'POST',
            headers: {
              'Authorization': 'Bearer ' + MAIN_API_KEY,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(batch)
          }
        );
      }
      await loadLog();
    } catch(e) {
      alert('Error clearing log: ' + e.message);
    }
  }

  async function exportCSV() {
    try {
      const response = await fetch(
        `https://${GRIST_DOMAIN}/api/docs/${MAIN_DOC_ID}/tables/EMR_Access_Log/records`,
        { headers: { 'Authorization': 'Bearer ' + MAIN_API_KEY } }
      );
      const data    = await response.json();
      const records = data.records || [];
      if (!records.length) return;

      const headers = ['Timestamp', 'User Name', 'User Email', 'Practitioner', 'Facility'];
      const sorted  = [...records].sort((a, b) => (b.fields.Timestamp || 0) - (a.fields.Timestamp || 0));

      const rows = sorted.map(r => {
        const f  = r.fields;
        const ts = f.Timestamp;
        const formatted = typeof ts === 'number' ? new Date(ts * 1000).toLocaleString('en-US') : (ts || '');
        return [formatted, f.User_Name || '', f.User_Email || '', f.Practitioner || '', f.Facility || '']
          .map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
      });

      const csv = [headers.join(','), ...rows].join('\n');
      const a   = document.createElement('a');
      a.href    = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
      a.download = `emr_access_log_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
    } catch(e) {
      alert('Export error: ' + e.message);
    }
  }

  function showError(msg) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('logTable').style.display   = 'none';
    const err = document.getElementById('errorMsg');
    err.textContent    = msg;
    err.style.display  = 'block';
  }

  init();
</script>
</body>
</html>
