<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Coverage</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f4f6f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 16px;
    border: 1px solid #e2e8f0;
    padding: 24px 28px;
    width: 100%;
    max-width: 520px;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .card-icon {
    width: 36px; height: 36px;
    background: #0d7377;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .card-title { font-size: 14px; font-weight: 600; color: #1a2332; }
  .card-sub   { font-size: 11px; color: #64748b; margin-top: 1px; }

  .divider { height: 1px; background: #f0f3f8; margin: 0 0 20px; }

  .dates-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .date-block { text-align: center; }
  .date-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: #94a3b8;
    margin-bottom: 6px;
  }
  .date-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px; font-weight: 500;
    color: #1a2332;
  }
  .date-block.end .date-value { color: #0d7377; }

  .arrow {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .arrow-line {
    width: 40px; height: 2px;
    background: linear-gradient(90deg, #cbd5e1, #0d7377);
    border-radius: 2px;
    position: relative;
  }
  .arrow-days {
    font-size: 11px; font-weight: 500;
    color: #64748b;
    white-space: nowrap;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .stat-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: #94a3b8; margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 16px; font-weight: 500;
    color: #1a2332;
  }

  .footer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #94a3b8;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; flex-shrink: 0; }
  .dot.stale { background: #f59e0b; }

  .loading {
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
    padding: 20px;
  }
  .error {
    text-align: center;
    color: #ef4444;
    font-size: 12px;
    padding: 10px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="card-icon">📅</div>
    <div>
      <div class="card-title">Data Coverage</div>
      <div class="card-sub" id="table-name">Work Sessions Data</div>
    </div>
  </div>
  <div class="divider"></div>

  <div id="loading" class="loading">Loading…</div>
  <div id="error" class="error" style="display:none"></div>

  <div id="content" style="display:none">
    <div class="dates-row">
      <div class="date-block">
        <div class="date-label">Earliest Entry</div>
        <div class="date-value" id="min-date">—</div>
      </div>
      <div class="arrow">
        <div class="arrow-line"></div>
        <div class="arrow-days" id="span-days">—</div>
      </div>
      <div class="date-block end">
        <div class="date-label">Latest Entry</div>
        <div class="date-value" id="max-date">—</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-label">Total Records</div>
        <div class="stat-value" id="total-records">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Members</div>
        <div class="stat-value" id="total-members">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Days Covered</div>
        <div class="stat-value" id="days-covered">—</div>
      </div>
    </div>

    <div class="footer">
      <div class="dot" id="freshness-dot"></div>
      <span id="freshness-msg"></span>
    </div>
  </div>
</div>

<script>
  var TABLE = 'Work_Sessions_Data';

  function toJsDate(ts) {
    if (typeof ts === 'number') return new Date(ts * 1000);
    return new Date(ts);
  }

  function fmtDate(ts) {
    var d   = toJsDate(ts);
    var m   = String(d.getUTCMonth() + 1).padStart(2,'0');
    var day = String(d.getUTCDate()).padStart(2,'0');
    return m + '/' + day + '/' + d.getUTCFullYear();
  }

  function daysBetween(minTs, maxTs) {
    return Math.round((toJsDate(maxTs) - toJsDate(minTs)) / 86400000);
  }

  function daysSince(maxTs) {
    var latest = toJsDate(maxTs);
    var today  = new Date();
    today.setUTCHours(0,0,0,0);
    latest.setUTCHours(0,0,0,0);
    return Math.round((today - latest) / 86400000);
  }

  grist.ready({ requiredAccess: 'full' });

  grist.docApi.fetchTable(TABLE).then(function(data) {
    var keys = Object.keys(data);
    var len  = data[keys[0]] ? data[keys[0]].length : 0;

    var lmap = {};
    keys.forEach(function(k) { lmap[k.toLowerCase()] = k; });

    var dateKey   = lmap['date']   || null;
    var memberKey = lmap['member_name'] || lmap['member'] || null;

    if (!dateKey || len === 0) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error').textContent = 'No date column found.';
      return;
    }

    var dates   = data[dateKey].filter(function(v) { return v != null && v !== ''; });
    var minDate = dates.reduce(function(a,b){ return a < b ? a : b; });
    var maxDate = dates.reduce(function(a,b){ return a > b ? a : b; });
    var span    = daysBetween(minDate, maxDate);

    var members = {};
    if (memberKey) {
      data[memberKey].forEach(function(v) { if (v) members[v] = 1; });
    }

    var ago  = daysSince(maxDate);
    var dot  = document.getElementById('freshness-dot');
    var msg  = document.getElementById('freshness-msg');
    if (ago === 0)      { dot.className = 'dot';       msg.textContent = 'Latest data is from today'; }
    else if (ago === 1) { dot.className = 'dot';       msg.textContent = 'Latest data is from yesterday'; }
    else if (ago <= 7)  { dot.className = 'dot stale'; msg.textContent = 'Latest data is ' + ago + ' days old'; }
    else                { dot.className = 'dot stale'; msg.textContent = 'Latest data is ' + ago + ' days old — may need update'; }

    document.getElementById('min-date').textContent      = fmtDate(minDate);
    document.getElementById('max-date').textContent      = fmtDate(maxDate);
    document.getElementById('span-days').textContent     = span + ' days';
    document.getElementById('total-records').textContent = len.toLocaleString();
    document.getElementById('total-members').textContent = Object.keys(members).length || '—';
    document.getElementById('days-covered').textContent  = (span + 1);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

  }).catch(function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Could not load table "' + TABLE + '".';
  });
</script>
</body>
</html>
