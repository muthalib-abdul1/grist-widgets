<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f1f0ed;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.container {
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e0deda;
  padding: 28px;
  width: 100%;
  max-width: 480px;
}

.title { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 24px; font-family: 'DM Mono', monospace; }

.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 11px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.07em;
  color: #888; margin-bottom: 6px; font-family: 'DM Mono', monospace;
}

.field input {
  width: 100%; padding: 8px 12px;
  border: 1px solid #e0deda; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  color: #111; background: #f8f7f5; outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: #2d6a4f; background: #fff; }

.preview {
  background: #f8f7f5; border: 1px solid #e0deda;
  border-radius: 7px; padding: 10px 12px;
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: #2d6a4f; margin-bottom: 20px; min-height: 32px;
}

.btn {
  width: 100%; padding: 11px;
  background: #1a1916; color: #fff; border: none;
  border-radius: 8px; font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background 0.15s, transform 0.1s;
}
.btn:hover { background: #2d6a4f; }
.btn:active { transform: scale(0.98); }
.btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }

.log {
  margin-top: 16px; max-height: 200px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
}
.log-item {
  font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 5px 8px; border-radius: 5px;
  background: #f8f7f5; color: #555;
}
.log-item.success { background: #d4edda; color: #1a7a40; }
.log-item.error   { background: #fde8d0; color: #b35a0a; }
.log-item.info    { background: #e8f0fe; color: #1a56db; }

.section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: #aaa;
  font-family: 'DM Mono', monospace; margin-bottom: 12px;
}
</style>
</head>
<body>
<div class="container">
  <div class="title">📅 Week Generator</div>
  <div class="subtitle">Auto-populate Week_List from Coverage</div>

  <div class="section-title">Generate New Week</div>

  <div class="field">
    <label>Week Number</label>
    <input type="number" id="weekNum" placeholder="e.g. 17" min="1" />
  </div>

  <div class="field">
    <label>Week Start Date (Sunday)</label>
    <input type="date" id="weekDate" />
  </div>

  <div class="field">
    <label>Week Label Preview</label>
    <div class="preview" id="preview">Fill in week number and date above</div>
  </div>

  <button class="btn" id="generateBtn" onclick="generate()">Generate Week Rows</button>

  <div class="log" id="log"></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Auto-detect next Sunday
    const today = new Date();
    const day = today.getDay();
    const daysUntilSunday = day === 0 ? 7 : 7 - day;
    const nextSunday = new Date(today);
    nextSunday.setDate(today.getDate() + daysUntilSunday);
    document.getElementById('weekDate').value = nextSunday.toISOString().split('T')[0];

    // Attach listeners
    document.getElementById('weekNum').addEventListener('input', updatePreview);
    document.getElementById('weekDate').addEventListener('input', updatePreview);
    document.getElementById('weekDate').addEventListener('change', updatePreview);

    updatePreview();
  });

  grist.ready({ requiredAccess: 'full' });

  function updatePreview() {
    const num  = document.getElementById('weekNum').value.trim();
    const date = document.getElementById('weekDate').value.trim();
    const preview = document.getElementById('preview');

    if (!num || !date) {
      preview.textContent = 'Fill in week number and date above';
      return;
    }

    const d = new Date(date + 'T00:00:00');
    if (isNaN(d.getTime())) {
      preview.textContent = 'Invalid date';
      return;
    }

    const formatted = d.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' });
    preview.textContent = `Week ${num} - ${formatted}`;
  }

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const month = String(d.getMonth() + 1).padStart(2, '0');
    const day   = String(d.getDate()).padStart(2, '0');
    const year  = d.getFullYear();
    return `${month}/${day}/${year}`;
  }

  function addLog(msg, type = '') {
    const log = document.getElementById('log');
    const item = document.createElement('div');
    item.className = `log-item ${type}`;
    item.textContent = msg;
    log.appendChild(item);
    log.scrollTop = log.scrollHeight;
  }

  function clearLog() { document.getElementById('log').innerHTML = ''; }

  async function generate() {
    const weekNum  = document.getElementById('weekNum').value.trim();
    const weekDate = document.getElementById('weekDate').value.trim();

    if (!weekNum || !weekDate) {
      addLog('⚠ Please fill in week number and date', 'error');
      return;
    }

    clearLog();

    // ── Duplicate check ──
    addLog('Checking for duplicates in Weekly Coverage Schedule…', 'info');
    try {
      const coverage = await grist.docApi.fetchTable('Weekly_Coverage_Schedule');
      const seen = new Map();
      const duplicates = new Set();

      for (let i = 0; i < coverage.id.length; i++) {
        const pId = coverage.Practitioner_Name?.[i];
        const fId = coverage.Facility_Name?.[i];
        const pName = coverage.Practitioner_Name_Value?.[i] || pId || 'Unknown';
        const fName = coverage.Facility_Name_Value?.[i]     || fId || 'Unknown';
        const key = `${pId}__${fId}`;

        if (seen.has(key)) {
          duplicates.add(`${pName} @ ${fName}`);
        } else {
          seen.set(key, true);
        }
      }

      if (duplicates.size > 0) {
        addLog('🚫 Duplicates found — fix before generating:', 'error');
        duplicates.forEach(d => addLog(`  ↳ ${d}`, 'error'));
        return;
      }
      addLog('✓ No duplicates found', 'success');
    } catch(e) {
      addLog(`⚠ Could not verify duplicates: ${e.message}`, 'error');
      return;
    }

    const weekLabel = `Week ${weekNum} - ${formatDate(weekDate)}`;
    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = 'Working…';

    try {
      // Step 1: Add week to Weeks_Table
      addLog(`Creating week: ${weekLabel}`, 'info');
      const weekResult = await grist.docApi.applyUserActions([
        ['AddRecord', 'Weeks_Table', null, { Week: weekLabel }]
      ]);
      const weekId = weekResult.rowIds?.[0]
        || weekResult.retValues?.[0]
        || (Array.isArray(weekResult) ? weekResult[0] : null)
        || weekResult;
      addLog(`✓ Week created (id: ${weekId})`, 'success');

      // Step 2: Get Coverage records
      addLog('Fetching Coverage records…', 'info');
      const covRecords = await grist.docApi.fetchTable('Weekly_Coverage_Schedule');
      addLog(`Found ${covRecords.id.length} coverage records`, 'info');

      const weekStartDate = new Date(weekDate + 'T00:00:00');
      const weekEndDate = new Date(weekStartDate);
      weekEndDate.setDate(weekStartDate.getDate() + 6);

      // Step 3: Filter active records and build Week_List rows
      let created = 0;
      const actions = [];

      for (let i = 0; i < covRecords.id.length; i++) {
        const startDate = covRecords.Start_Date[i];
        const endDate   = covRecords.End_Date[i];

        const start = startDate ? new Date(startDate * 1000) : null;
        const end   = endDate   ? new Date(endDate   * 1000) : null;

        const isActive = start &&
          start <= weekEndDate &&
          (!end || end >= weekStartDate);

        if (isActive) {
          actions.push(['AddRecord', 'Week_List', null, {
            Week:             weekId,
            Practitioner_Name: covRecords.Practitioner_Name[i],
            Facility_Name:    covRecords.id[i],
            Coverage_Type:    ['L', covRecords.Coverage_Type[i]],
            Overall_Status:   'Expected to Round',  // ← auto-fill
            Audit_Status:     'Not Initiated'        // ← auto-fill
          }]);
          created++;
        }
      }

      if (actions.length === 0) {
        addLog('No active coverage records found', 'error');
        return;
      }

      addLog(`Creating ${created} Week_List rows…`, 'info');

      // Batch in groups of 50
      for (let i = 0; i < actions.length; i += 50) {
        const batch = actions.slice(i, i + 50);
        await grist.docApi.applyUserActions(batch);
        addLog(`✓ Created ${Math.min(i + 50, actions.length)}/${actions.length} rows`, 'success');
      }

      addLog(`✅ Done! ${created} rows added for ${weekLabel}`, 'success');

    } catch(e) {
      addLog(`Error: ${e.message || JSON.stringify(e)}`, 'error');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Generate Week Rows';
    }
  }
</script>
</body>
</html>
