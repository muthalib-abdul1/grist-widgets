<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR Update</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'DM Sans', sans-serif; background: #f1f0ed; display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow: hidden; }

.top-bar { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.top-title { font-size: 13px; font-weight: 700; color: #111; }
.record-badge { font-family: 'DM Mono', monospace; font-size: 10px; background: #1a1916; color: #fff; padding: 2px 8px; border-radius: 10px; }
.search-input { margin-left: auto; padding: 6px 12px; border: 1.5px solid #e0deda; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: #111; background: #fff; outline: none; width: 200px; transition: border-color 0.15s; }
.search-input:focus { border-color: #2d6a4f; }

.main-layout { display: grid; grid-template-columns: 220px 1fr; gap: 10px; flex: 1; overflow: hidden; height: 0; }

.pract-list { background: #fff; border-radius: 10px; border: 1px solid #e0deda; overflow-y: auto; display: flex; flex-direction: column; height: 100%; }
.pract-list-header { padding: 10px 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; font-family: 'DM Mono', monospace; border-bottom: 1px solid #f0eeea; flex-shrink: 0; }
.pract-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f8f7f5; transition: background 0.12s; flex-shrink: 0; }
.pract-item:hover { background: #f8f7f5; }
.pract-item.active { background: #1a1916; }
.pract-item.active .pract-name { color: #fff; }
.pract-item.active .pract-count { color: rgba(255,255,255,0.45); }
.pract-name { font-size: 12px; font-weight: 600; color: #111; }
.pract-count { font-size: 10px; font-family: 'DM Mono', monospace; color: #aaa; margin-top: 2px; }

.cards-panel { overflow-y: scroll; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; height: 100%; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #bbb; font-family: 'DM Mono', monospace; font-size: 12px; gap: 8px; }

.fac-card { background: #fff; border-radius: 10px; border: 1px solid #e0deda; padding: 16px; transition: border-color 0.2s; flex-shrink: 0; }
.fac-card.dirty { border-color: #f0a500; }
.fac-card.saved-ok { border-color: #2d6a4f; }

.fac-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #f0eeea; }
.fac-name { font-size: 13px; font-weight: 700; color: #111; }
.card-actions { display: flex; gap: 6px; align-items: center; }
.save-btn { padding: 4px 14px; border-radius: 6px; background: #1a1916; color: #fff; border: none; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: background 0.15s; display: none; }
.save-btn:hover { background: #2d6a4f; }
.save-btn.visible { display: inline-block; }
.save-btn:disabled { background: #ccc; cursor: not-allowed; }
.discard-btn { padding: 4px 10px; border-radius: 6px; background: #fff; color: #aaa; border: 1.5px solid #e0deda; font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; display: none; }
.discard-btn:hover { border-color: #b35a0a; color: #b35a0a; }
.discard-btn.visible { display: inline-block; }
.saved-tag { font-family: 'DM Mono', monospace; font-size: 10px; color: #2d6a4f; display: none; }
.saved-tag.visible { display: inline-block; }

.card-body { display: grid; grid-template-columns: 1fr 170px; gap: 16px; align-items: start; }

.fields-left { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group.full { grid-column: span 2; }

.field-lbl { font-size: 12px; font-weight: 700; color: #111; font-family: 'DM Sans', sans-serif; }
.field-inp {
  width: 100%; padding: 6px 10px; border: 1.5px solid #e8e5e0; border-radius: 6px;
  font-family: 'DM Sans', sans-serif; font-size: 12px; color: #111; font-weight: 400;
  background: #fafaf8; outline: none; transition: border-color 0.15s, background 0.15s;
}
.field-inp:focus { border-color: #2d6a4f; background: #fff; }
.field-inp.changed { border-color: #f0a500; background: #fffbf0; }
.field-inp.url-inp { color: #1a56db; }
textarea.field-inp { resize: vertical; min-height: 52px; line-height: 1.5; }

.pw-row { display: flex; gap: 5px; }
.pw-row .field-inp { flex: 1; min-width: 0; }
.copy-btn { flex-shrink: 0; padding: 0 8px; border-radius: 6px; border: 1.5px solid #e8e5e0; background: #fff; font-size: 11px; color: #aaa; cursor: pointer; transition: all 0.15s; height: 32px; }
.copy-btn:hover { border-color: #2d6a4f; color: #2d6a4f; }
.copy-btn.copied { background: #e8f5e9; border-color: #2d6a4f; color: #2d6a4f; }

.qr-right { display: flex; flex-direction: column; gap: 8px; }
.qr-img-box { width: 170px; height: 170px; border-radius: 8px; border: 1px solid #e0deda; background: #f8f7f5; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; flex-shrink: 0; }
.qr-img-box img { width: 100%; height: 100%; object-fit: contain; }
.qr-no-img { font-family: 'DM Mono', monospace; font-size: 10px; color: #ccc; text-align: center; padding: 8px; }

.loading-state { text-align: center; padding: 40px; font-family: 'DM Mono', monospace; font-size: 12px; color: #aaa; }

#qrOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); z-index: 9999; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
#qrOverlay.visible { display: flex; }
#qrOverlay img { max-width: 88vw; max-height: 78vh; border-radius: 12px; background: #fff; padding: 14px; }
#qrOverlay .close-btn { color: #fff; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; padding: 8px 24px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
#qrOverlay .close-btn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-title">✏️ EMR Update</div>
  <span class="record-badge" id="recordBadge">Loading…</span>
  <input type="text" class="search-input" id="searchInput" placeholder="Search practitioner…" oninput="filterPractitioners()" />
</div>

<div class="main-layout">
  <div class="pract-list" id="practList">
    <div class="pract-list-header">Practitioners</div>
    <div class="loading-state">Loading…</div>
  </div>
  <div class="cards-panel" id="cardsPanel">
    <div class="empty-state">
      <span style="font-size:28px;">👈</span>
      <span>Select a practitioner to view facilities</span>
    </div>
  </div>
</div>

<div id="qrOverlay">
  <div style="color:rgba(255,255,255,0.6);font-family:'DM Mono',monospace;font-size:11px;">Tap to close</div>
  <img id="qrOverlayImg" src="" onclick="closeQR()" />
  <button class="close-btn" onclick="closeQR()">✕ Close</button>
</div>

<script>
  let flatRecords = [];
  let allPractitioners = [];
  let selectedPract = null;

  grist.ready({ requiredAccess: 'full' });

  async function init() {
    try {
      const [emr, employees, facilities] = await Promise.all([
        grist.docApi.fetchTable('EMR_Access'),
        grist.docApi.fetchTable('Employee'),
        grist.docApi.fetchTable('Facility')
      ]);

      const empMap = {};
      for (let i = 0; i < employees.id.length; i++)
        empMap[employees.id[i]] = employees.Employee_Name?.[i] || employees.Name?.[i] || employees.Full_Name?.[i] || employees.EmployeeName?.[i] || Object.values(employees).map(col => col[i]).find(v => typeof v === 'string' && v.length > 1) || String(employees.id[i]);

      console.log('Employee columns:', Object.keys(employees));
      console.log('Sample empMap entry:', Object.entries(empMap).slice(0,3));

      const facMap = {};
      for (let i = 0; i < facilities.id.length; i++)
        facMap[facilities.id[i]] = facilities.Facility_Name?.[i] || '';

      flatRecords = [];

      for (let i = 0; i < emr.id.length; i++) {

        // Resolve practitioner — single ref or RefList ['L', id]
        let rawPract = emr.Practitioner_Name?.[i];
        let practId;
        if (Array.isArray(rawPract)) {
          practId = rawPract.find(x => typeof x === 'number');
        } else if (typeof rawPract === 'number') {
          practId = rawPract;
        }
        const practName = (practId && empMap[practId]) ? empMap[practId] : '';

        // Resolve facilities — single ref or RefList ['L', id1, id2, ...]
        let rawFac = emr.Facility_Name?.[i];
        let facIds = [];
        if (Array.isArray(rawFac)) {
          facIds = rawFac.filter(x => typeof x === 'number');
        } else if (typeof rawFac === 'number') {
          facIds = [rawFac];
        }
        if (facIds.length === 0) facIds = [null];

        facIds.forEach((facId, j) => {
          flatRecords.push({
            rowId:         emr.id[i],
            facId,
            practName,
            facName:       (facId && facMap[facId]) ? facMap[facId] : (facId ? String(facId) : '—'),
            username:      emr.Username?.[i]            || '',
            password:      emr.Password?.[i]            || '',
            ehrSystem:     emr.EHR_System?.[i]          || '',
            accessType:    emr.Access_Type?.[i]         || '',
            primaryBackup: emr.Primary_Backup?.[i]      || '',
            billing:       emr.Billing_Access_Type?.[i] || '',
            notes:         emr.Notes?.[i]               || '',
            qrCode:        emr.QR_Code?.[i]             || ''
          });
        });
      }

      document.getElementById('recordBadge').textContent = emr.id.length + ' records';

      const seen = new Set();
      allPractitioners = [];
      flatRecords.forEach(r => {
        if (r.practName && !seen.has(r.practName)) {
          seen.add(r.practName);
          allPractitioners.push(r.practName);
        }
      });
      allPractitioners.sort();
      renderPractList(allPractitioners);

    } catch(e) {
      document.getElementById('practList').innerHTML =
        '<div class="pract-list-header">Practitioners</div><div class="loading-state" style="color:#b35a0a">Error: ' + e.message + '</div>';
    }
  }

  function renderPractList(practs) {
    const container = document.getElementById('practList');
    container.innerHTML = '<div class="pract-list-header">Practitioners</div>';
    if (!practs.length) { container.innerHTML += '<div class="loading-state">No results</div>'; return; }
    practs.forEach(name => {
      const count = flatRecords.filter(r => r.practName === name).length;
      const div = document.createElement('div');
      div.className = 'pract-item' + (selectedPract === name ? ' active' : '');
      div.innerHTML = `<div class="pract-name">${esc(name)}</div><div class="pract-count">${count} facilit${count===1?'y':'ies'}</div>`;
      div.onclick = () => selectPractitioner(name);
      container.appendChild(div);
    });
  }

  function filterPractitioners() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderPractList(allPractitioners.filter(p => p.toLowerCase().includes(q)));
  }

  function selectPractitioner(name) {
    selectedPract = name;
    filterPractitioners();
    renderCards(name);
  }

  function renderCards(practName) {
    const panel = document.getElementById('cardsPanel');
    const records = flatRecords.filter(r => r.practName === practName);

    // Debug counter
    const debug = document.createElement('div');
    debug.style.cssText = 'font-family:DM Mono,monospace;font-size:11px;color:#888;padding:4px 0;flex-shrink:0;';
    debug.textContent = `Found ${records.length} records for "${practName}" (total flatRecords: ${flatRecords.length})`;

    if (!records.length) {
      panel.innerHTML = '';
      panel.appendChild(debug);
      panel.innerHTML += '<div class="empty-state"><span>No facilities found</span></div>';
      return;
    }
    panel.innerHTML = '';
    panel.appendChild(debug);
    records.sort((a, b) => a.facName.localeCompare(b.facName));
    records.forEach((row, idx) => {
      const key = 'k' + row.rowId + '_' + idx;
      const card = buildCard(row, key);
      card._origData = { ...row };
      panel.appendChild(card);
    });
  }

  function buildCard(row, key) {
    const card = document.createElement('div');
    card.className = 'fac-card';
    card.id = 'card-' + key;
    card.innerHTML = `
      <div class="fac-card-header">
        <div class="fac-name">${esc(row.facName)}</div>
        <div class="card-actions">
          <span class="saved-tag" id="savedtag-${key}">✓ Saved</span>
          <button class="discard-btn" id="discard-${key}" onclick="discardCard('${key}')">✕ Discard</button>
          <button class="save-btn" id="savebtn-${key}" onclick="saveCard('${key}', ${row.rowId})">💾 Save</button>
        </div>
      </div>
      <div class="card-body">
        <div class="fields-left">
          <div class="field-group">
            <span class="field-lbl">Username</span>
            <input type="text" class="field-inp" id="${key}_username" value="${esc(row.username)}" oninput="markChanged('${key}',this)" />
          </div>
          <div class="field-group">
            <span class="field-lbl">Password</span>
            <div class="pw-row">
              <input type="text" class="field-inp" id="${key}_password" value="${esc(row.password)}" oninput="markChanged('${key}',this)" />
              <button class="copy-btn" id="copybtn-${key}" onclick="copyPw('${key}')">⎘</button>
            </div>
          </div>
          <div class="field-group">
            <span class="field-lbl">EHR System</span>
            <input type="text" class="field-inp" id="${key}_ehr" value="${esc(row.ehrSystem)}" oninput="markChanged('${key}',this)" />
          </div>
          <div class="field-group">
            <span class="field-lbl">Access Type</span>
            <input type="text" class="field-inp" id="${key}_accessType" value="${esc(row.accessType)}" oninput="markChanged('${key}',this)" />
          </div>
          <div class="field-group">
            <span class="field-lbl">Primary / Backup</span>
            <input type="text" class="field-inp" id="${key}_primaryBackup" value="${esc(row.primaryBackup)}" oninput="markChanged('${key}',this)" />
          </div>
          <div class="field-group">
            <span class="field-lbl">Billing Access</span>
            <input type="text" class="field-inp" id="${key}_billing" value="${esc(row.billing)}" oninput="markChanged('${key}',this)" />
          </div>
          <div class="field-group full">
            <span class="field-lbl">Notes</span>
            <textarea class="field-inp" id="${key}_notes" oninput="markChanged('${key}',this)">${esc(row.notes)}</textarea>
          </div>
        </div>
        <div class="qr-right">
          <div class="qr-img-box" id="qrbox-${key}" onclick="openQRFromKey('${key}')">
            ${row.qrCode && row.qrCode.startsWith('http')
              ? `<img src="${esc(row.qrCode)}" onerror="this.parentElement.innerHTML='<div class=qr-no-img>⚠ Load error</div>'" />`
              : `<div class="qr-no-img">No QR</div>`}
          </div>
          <div class="field-group">
            <span class="field-lbl">QR Code URL</span>
            <input type="text" class="field-inp url-inp" id="${key}_qr" value="${esc(row.qrCode)}"
              oninput="markChanged('${key}',this); updateQRBox('${key}')" placeholder="https://…" />
          </div>
        </div>
      </div>`;
    return card;
  }

  function updateQRBox(key) {
    const url = document.getElementById(key + '_qr').value.trim();
    const box = document.getElementById('qrbox-' + key);
    if (url && url.startsWith('http')) {
      box.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='<div class=qr-no-img>⚠ Load error</div>'" />`;
    } else {
      box.innerHTML = '<div class="qr-no-img">No QR</div>';
    }
  }

  function openQRFromKey(key) {
    const url = document.getElementById(key + '_qr')?.value.trim();
    if (url && url.startsWith('http')) openQR(url);
  }

  function markChanged(key, el) {
    el.classList.add('changed');
    document.getElementById('card-' + key).classList.add('dirty');
    document.getElementById('card-' + key).classList.remove('saved-ok');
    document.getElementById('savebtn-' + key).classList.add('visible');
    document.getElementById('discard-' + key).classList.add('visible');
    document.getElementById('savedtag-' + key).classList.remove('visible');
  }

  async function saveCard(key, rowId) {
    const btn = document.getElementById('savebtn-' + key);
    btn.disabled = true; btn.textContent = 'Saving…';
    const updates = {
      Username:            document.getElementById(key+'_username').value.trim(),
      Password:            document.getElementById(key+'_password').value.trim(),
      EHR_System:          document.getElementById(key+'_ehr').value.trim(),
      Access_Type:         document.getElementById(key+'_accessType').value.trim(),
      Primary_Backup:      document.getElementById(key+'_primaryBackup').value.trim(),
      Billing_Access_Type: document.getElementById(key+'_billing').value.trim(),
      Notes:               document.getElementById(key+'_notes').value.trim(),
      QR_Code:             document.getElementById(key+'_qr').value.trim(),
    };
    try {
      await grist.docApi.applyUserActions([['UpdateRecord', 'EMR_Access', rowId, updates]]);

      // Update local cache
      flatRecords.forEach(r => {
        if (r.rowId === rowId) {
          r.username = updates.Username; r.password = updates.Password;
          r.ehrSystem = updates.EHR_System; r.accessType = updates.Access_Type;
          r.primaryBackup = updates.Primary_Backup; r.billing = updates.Billing_Access_Type;
          r.notes = updates.Notes; r.qrCode = updates.QR_Code;
        }
      });

      const card = document.getElementById('card-' + key);
      if (card._origData) Object.assign(card._origData, { username: updates.Username, password: updates.Password, ehrSystem: updates.EHR_System, accessType: updates.Access_Type, primaryBackup: updates.Primary_Backup, billing: updates.Billing_Access_Type, notes: updates.Notes, qrCode: updates.QR_Code });
      card.classList.remove('dirty'); card.classList.add('saved-ok');
      card.querySelectorAll('.field-inp').forEach(el => el.classList.remove('changed'));
      btn.classList.remove('visible');
      document.getElementById('discard-' + key).classList.remove('visible');
      const tag = document.getElementById('savedtag-' + key);
      tag.classList.add('visible');
      setTimeout(() => { tag.classList.remove('visible'); card.classList.remove('saved-ok'); }, 3000);
    } catch(e) { alert('Save failed: ' + e.message); }
    finally { btn.disabled = false; btn.textContent = '💾 Save'; }
  }

  function discardCard(key) {
    const card = document.getElementById('card-' + key);
    const o = card._origData;
    if (!o) return;
    document.getElementById(key+'_username').value      = o.username      || '';
    document.getElementById(key+'_password').value      = o.password      || '';
    document.getElementById(key+'_ehr').value           = o.ehrSystem     || '';
    document.getElementById(key+'_accessType').value    = o.accessType    || '';
    document.getElementById(key+'_primaryBackup').value = o.primaryBackup || '';
    document.getElementById(key+'_billing').value       = o.billing       || '';
    document.getElementById(key+'_notes').value         = o.notes         || '';
    document.getElementById(key+'_qr').value            = o.qrCode        || '';
    updateQRBox(key);
    card.classList.remove('dirty','saved-ok');
    card.querySelectorAll('.field-inp').forEach(el => el.classList.remove('changed'));
    document.getElementById('savebtn-' + key).classList.remove('visible');
    document.getElementById('discard-' + key).classList.remove('visible');
    document.getElementById('savedtag-' + key).classList.remove('visible');
  }

  function copyPw(key) {
    const pw = document.getElementById(key + '_password').value;
    navigator.clipboard.writeText(pw).then(() => {
      const btn = document.getElementById('copybtn-' + key);
      btn.textContent = '✓'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '⎘'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function openQR(url) { document.getElementById('qrOverlayImg').src = url; document.getElementById('qrOverlay').classList.add('visible'); }
  function closeQR() { document.getElementById('qrOverlay').classList.remove('visible'); document.getElementById('qrOverlayImg').src = ''; }

  init();
</script>
</body>
</html>
